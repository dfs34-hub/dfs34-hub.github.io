<!DOCTYPE html>
<html lang="pt-br">
<head>
  <!--meta tags são metadados, ou seja são dados e informações que são lidos somente pelo navegador-->
  <meta charset="UTF-8"> <!--definir o tipo de caracteres compatível com o site, assim não tendo problema com acentuação-->
  <meta http-equiv="X-UA-Compatible" content="IE=edge"> <!--possibilita a compatibilidade para o Internet Explorer a partir da versão mais recente do site na versão do Edge-->
  <meta name="viewport" content="width=device-width, initial-escale=1.0"> <!--permitirá que o site se adapte a proporção da tela do usuário-->
  <meta name="description" content="site para a disciplina INTW"> <!--descreverá o site-->
  <meta name="keywords" content="site INTW, INTW, disciplina, html, CSS"> <!--define as palavras chaves do site, facilitando a busca dos navegadores-->
  <meta name="author" content="Daniel Francisco"> <!--define o nome do autor do site-->
  
  <link rel="stylesheet" href="estilo.css">
  <title>site para a disciplina INTW</title>
</head>
<body>
  <!--a tag <b></b> é uma tag em realça o texto com negrito-->
  <!--a tag <strong></strong> é uma tag que além de realçar, vai dizer ao navegador que aquela parte é importante-->
  <h1>site para a disciplina INTW</h1>
  <p>página com conteúdo em <b>html, CSS e Javascript</b></p>
  <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit.
     Suscipit provident <strong>ad accusamus iusto laudantium</strong> enim fuga
      nulla quod amet fugiat quae tenetur, facere rerum? Nulla
      corrupti debitis fuga quae tempore.</p>
</body>
</html>
